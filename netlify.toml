# Netlify configuration (only used if the site is hosted on Netlify).
#
# The home page is index.html at the root, which every host serves at "/"
# automatically, so no rewrite is needed for the front door.

# Nice-to-have: let visitors reach the editor at /admin (with or without the
# trailing slash).
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
